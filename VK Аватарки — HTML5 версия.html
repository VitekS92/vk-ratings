    <style>

<script>
    // ============================================
    // ВАША ССЫЛКА НА ВЕБ-ПРИЛОЖЕНИЕ
    // ============================================
    const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx_lczvkRPWLcWJREJ-aAgROWaGVUjaQQ0SX0n_thHSsudUPNpUiD4yA1LSNdYtuhbLWA/exec';

    // HTML5: Service Worker для offline режима
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('/sw.js').catch(err => console.log('ServiceWorker error:', err));
    }

    // HTML5: Drag & Drop функции
    let dragCounter = 0;
    
    function dragOver(event) {
        event.preventDefault();
        const dropZone = document.getElementById('dropZone');
        if (dragCounter === 0) dropZone.classList.add('drag-over');
        dragCounter++;
    }
    
    function dragLeave(event) {
        dragCounter--;
        if (dragCounter === 0) {
            document.getElementById('dropZone').classList.remove('drag-over');
        }
    }
    
    function dropHandler(event) {
        event.preventDefault();
        dragCounter = 0;
        const dropZone = document.getElementById('dropZone');
        dropZone.classList.remove('drag-over');
        
        const files = event.dataTransfer.files;
        if (files.length > 0) {
            const file = files[0];
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('linksInput').value = e.target.result;
                document.getElementById('status').innerHTML = '✅ Файл загружен! Нажмите "Загрузить" для получения аватарок.';
            };
            reader.readAsText(file);
        }
    }
    
    // Клик по drop-зоне для выбора файла
    document.getElementById('dropZone').onclick = () => {
        document.getElementById('fileInput').click();
    };
    document.getElementById('fileInput').onchange = (e) => {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('linksInput').value = e.target.result;
            };
            reader.readAsText(file);
        }
    };

    // Безопасный логгер
    function safeLog() { try { if (window.console && console.log) console.log.apply(console, arguments); } catch(e) {} }
    function safeWarn() { try { if (window.console && console.warn) console.warn.apply(console, arguments); } catch(e) {} }

    const CRITERIA = [
        { id: 'figure', name: '💃 Фигура', emoji: '💃' },
        { id: 'looks', name: '👸 Внешность', emoji: '👸' },
        { id: 'interests', name: '📚 Интересы', emoji: '📚' },
        { id: 'myRating', name: '🧠 Моя оценка', emoji: '🧠' }
    ];

    let currentUsers = [];
    let nextCardId = 0;
    let currentSortMode = 'original';
    let autoSyncTimer = null;
    let isSyncing = false;

    // === Синхронизация с Google Sheets ===
    async function saveToCloud() {
        if (!APPS_SCRIPT_URL || isSyncing) return false;
        isSyncing = true;
        const badge = document.getElementById('syncBadge');
        if (badge) badge.className = 'sync-status syncing';
        
        try {
            const usersToSave = currentUsers.filter(u => u.user).map(u => ({
                link: u.link,
                scores: u.scores,
                totalRating: u.totalRating,
                isFace: u.isFace,
                isDeleted: u.isDeleted
            }));
            
            const params = new URLSearchParams();
            params.append('action', 'save');
            params.append('data', JSON.stringify(usersToSave));
            
            await fetch(`${APPS_SCRIPT_URL}?${params.toString()}`, { method: 'GET', mode: 'no-cors' });
            
            // HTML5: Сохраняем в localStorage как резервную копию
            localStorage.setItem('vk_ratings_backup', JSON.stringify(usersToSave));
            
            if (badge) {
                badge.className = 'sync-status synced';
                setTimeout(() => {
                    if(document.getElementById('syncBadge')) document.getElementById('syncBadge').className = 'sync-status';
                }, 2000);
            }
            return true;
        } catch(e) {
            safeWarn('Ошибка сохранения:', e);
            if (badge) badge.className = 'sync-status error';
            return false;
        } finally {
            isSyncing = false;
        }
    }

    async function loadFromCloud() {
        if (!APPS_SCRIPT_URL) return null;
        try {
            const response = await fetch(`${APPS_SCRIPT_URL}?action=load`);
            const data = await response.json();
            if (data.status === 'ok' && data.users) {
                const ratings = {};
                for (const user of data.users) {
                    ratings[user.link] = {
                        scores: user.scores,
                        totalRating: user.totalRating,
                        isFace: user.isFace,
                        isDeleted: user.isDeleted
                    };
                }
                return ratings;
            }
        } catch(e) {
            safeWarn('Ошибка загрузки:', e);
            // HTML5: Пытаемся загрузить из localStorage
            const backup = localStorage.getItem('vk_ratings_backup');
            if (backup) {
                try {
                    const users = JSON.parse(backup);
                    const ratings = {};
                    for (const user of users) {
                        ratings[user.link] = {
                            scores: user.scores,
                            totalRating: user.totalRating,
                            isFace: user.isFace,
                            isDeleted: user.isDeleted
                        };
                    }
                    document.getElementById('syncBadge').className = 'sync-status offline';
                    return ratings;
                } catch(e2) {}
            }
        }
        return null;
    }

    async function syncFromCloud() {
        const cloudRatings = await loadFromCloud();
        if (cloudRatings && currentUsers.length) {
            let loadedCount = 0;
            for (const user of currentUsers) {
                if (user.user && cloudRatings[user.link]) {
                    const cr = cloudRatings[user.link];
                    user.scores = cr.scores || { figure:0, looks:0, interests:0, myRating:0 };
                    user.totalRating = cr.totalRating || calculateTotalRating(user.scores);
                    user.isFace = cr.isFace || false;
                    user.isDeleted = cr.isDeleted || false;
                    loadedCount++;
                }
            }
            renderUIFromData();
            const statusDiv = document.getElementById('status');
            if (statusDiv) statusDiv.innerHTML = `✅ Загружено из облака: восстановлено ${loadedCount} оценок.`;
            return true;
        }
        return false;
    }

    function startAutoSync() {
        if (autoSyncTimer) clearInterval(autoSyncTimer);
        autoSyncTimer = setInterval(() => {
            if (currentUsers.length > 0 && !isSyncing) {
                saveToCloud();
            }
        }, 10000);
    }

    function calculateTotalRating(scores) {
        let sum = 0, count = 0;
        for (const c of CRITERIA) {
            const val = scores[c.id] || 0;
            if (val > 0) { sum += val; count++; }
        }
        return count > 0 ? sum / count : 0;
    }

    function renderUIFromData() {
        for (const user of currentUsers) {
            if (!user.user) continue;
            const card = document.getElementById(user.elementId);
            if (!card) continue;
            for (const c of CRITERIA) {
                const rating = user.scores[c.id] || 0;
                const starsDiv = card.querySelector(`.stars-${c.id}`);
                if (starsDiv) {
                    const stars = starsDiv.querySelectorAll('.star-small');
                    stars.forEach((star, idx) => { if (idx+1 <= rating) star.classList.add('selected'); else star.classList.remove('selected'); });
                }
                const valSpan = card.querySelector(`.criterion-value-${c.id}`);
                if (valSpan) valSpan.innerText = rating;
            }
            const totalSpan = card.querySelector('.total-rating span');
            if (totalSpan) totalSpan.innerText = user.totalRating.toFixed(1);
            card.classList.remove('top-rated', 'high-rating');
            if (user.totalRating >= 4.5) card.classList.add('top-rated');
            else if (user.totalRating >= 3.5) card.classList.add('high-rating');
            let badge = card.querySelector('.rank-badge');
            if (user.totalRating > 0) {
                if (!badge) { badge = document.createElement('div'); badge.className = 'rank-badge'; card.insertBefore(badge, card.firstChild); }
                if (user.totalRating >= 4.5) badge.innerHTML = '👑 ТОП';
                else if (user.totalRating >= 4) badge.innerHTML = `⭐ ${user.totalRating.toFixed(1)}`;
                else badge.innerHTML = `${user.totalRating.toFixed(1)} ⭐`;
            } else if (badge) badge.remove();
            const cb = card.querySelector(`#chk_${user.elementId}`);
            if (cb) cb.checked = user.isFace;
            if (user.isDeleted) card.style.display = 'none';
            else card.style.display = 'block';
        }
        updateStats();
    }

    function updateStats() {
        const visible = currentUsers.filter(u => !u.isDeleted);
        const total = visible.length;
        const avg = total > 0 ? (visible.reduce((s,u) => s + u.totalRating, 0) / total).toFixed(1) : 0;
        const statsDiv = document.getElementById('statsText');
        if (statsDiv) statsDiv.innerHTML = `📊 Всего: ${total} | ⭐ Средний: ${avg}`;
    }

    window.setCriterionRating = (cardId, criterionId, rating) => {
        const user = currentUsers.find(u => u.elementId === cardId);
        if (user && user.user && !user.isDeleted) {
            user.scores[criterionId] = rating;
            user.totalRating = calculateTotalRating(user.scores);
            const card = document.getElementById(cardId);
            if (card) {
                const starsDiv = card.querySelector(`.stars-${criterionId}`);
                if (starsDiv) {
                    starsDiv.querySelectorAll('.star-small').forEach((star, idx) => {
                        if (idx+1 <= rating) star.classList.add('selected');
                        else star.classList.remove('selected');
                    });
                }
                const valSpan = card.querySelector(`.criterion-value-${criterionId}`);
                if (valSpan) valSpan.innerText = rating;
                const totalSpan = card.querySelector('.total-rating span');
                if (totalSpan) totalSpan.innerText = user.totalRating.toFixed(1);
                card.classList.remove('top-rated', 'high-rating');
                if (user.totalRating >= 4.5) card.classList.add('top-rated');
                else if (user.totalRating >= 3.5) card.classList.add('high-rating');
                let badge = card.querySelector('.rank-badge');
                if (user.totalRating > 0) {
                    if (!badge) { badge = document.createElement('div'); badge.className = 'rank-badge'; card.insertBefore(badge, card.firstChild); }
                    if (user.totalRating >= 4.5) badge.innerHTML = '👑 ТОП';
                    else if (user.totalRating >= 4) badge.innerHTML = `⭐ ${user.totalRating.toFixed(1)}`;
                    else badge.innerHTML = `${user.totalRating.toFixed(1)} ⭐`;
                } else if (badge) badge.remove();
            }
            updateStats();
            if (currentSortMode !== 'original') sortAndRender();
            saveToCloud();
        }
    };

    window.deleteAccount = (cardId) => {
        const user = currentUsers.find(u => u.elementId === cardId);
        if (user && !user.isDeleted) {
            user.isDeleted = true;
            const card = document.getElementById(cardId);
            if (card) card.style.display = 'none';
            updateStats();
            saveToCloud();
        }
    };

    window.toggleFace = (cardId, checked) => {
        const user = currentUsers.find(u => u.elementId === cardId);
        if (user && user.user) {
            user.isFace = checked;
            saveToCloud();
        }
    };

    function restoreAll() {
        currentUsers.forEach(u => {
            if (u.isDeleted) {
                u.isDeleted = false;
                const card = document.getElementById(u.elementId);
                if(card) card.style.display = 'block';
            }
        });
        updateStats();
        if(currentSortMode !== 'original') sortAndRender();
        saveToCloud();
    }

    function resetAllFaces() {
        currentUsers.forEach(u => {
            u.isFace = false;
            const card = document.getElementById(u.elementId);
            if(card) {
                const cb = card.querySelector(`#chk_${u.elementId}`);
                if(cb) cb.checked = false;
            }
        });
        saveToCloud();
    }

    function sortAndRender() {
        let sorted = [...currentUsers.filter(u => !u.isDeleted)];
        if (currentSortMode === 'ratingDesc') sorted.sort((a,b) => (b.totalRating||0) - (a.totalRating||0));
        else if (currentSortMode === 'ratingAsc') sorted.sort((a,b) => (a.totalRating||0) - (b.totalRating||0));
        const grid = document.getElementById('avatarsGrid');
        const cards = [...grid.children];
        const order = new Map(sorted.map((u,i) => [u.elementId, i]));
        cards.sort((a,b) => (order.get(a.id)||999) - (order.get(b.id)||999));
        cards.forEach(c => grid.appendChild(c));
        ['sortByRatingDesc','sortByRatingAsc','sortByOriginal'].forEach(id => { const btn = document.getElementById(id); if(btn) btn.classList.remove('active'); });
        if(currentSortMode==='ratingDesc') document.getElementById('sortByRatingDesc')?.classList.add('active');
        else if(currentSortMode==='ratingAsc') document.getElementById('sortByRatingAsc')?.classList.add('active');
        else document.getElementById('sortByOriginal')?.classList.add('active');
    }

    function applyFilter(type) {
        for (const u of currentUsers) {
            const card = document.getElementById(u.elementId);
            if (!card) continue;
            if (u.isDeleted) { card.style.display = 'none'; continue; }
            let show = true;
            if (type === 'highRated') show = (u.totalRating||0) >= 3.5;
            else if (type === 'unrated') show = !u.totalRating || u.totalRating === 0;
            else if (type === 'faces') show = u.isFace === true;
            card.style.display = show ? 'block' : 'none';
        }
        ['showAllBtn','showHighRatedBtn','showUnratedBtn','showFacesOnlyBtn'].forEach(id => { const btn = document.getElementById(id); if(btn) btn.classList.remove('active'); });
        if(type==='all') document.getElementById('showAllBtn')?.classList.add('active');
        if(type==='highRated') document.getElementById('showHighRatedBtn')?.classList.add('active');
        if(type==='unrated') document.getElementById('showUnratedBtn')?.classList.add('active');
        if(type==='faces') document.getElementById('showFacesOnlyBtn')?.classList.add('active');
        updateStats();
    }

    // === VK API функции ===
    function extractTokenFromString(input) {
        if (!input) return null;
        let token = input.trim();
        if (token.includes('access_token=')) {
            const match = token.match(/access_token=([^&]+)/);
            if (match) token = decodeURIComponent(match[1]);
        }
        if (token.match(/^vk[12][a-z0-9\.]+/i) || token.length > 30) return token;
        return token.length > 10 ? token : null;
    }

    function extractUserId(link) { const m = link.match(/id(\d+)/); return m ? m[1] : null; }
    
    function parseLinksFromText(text) {
        const lines = text.split(/\r?\n/);
        const links = [];
        for (let line of lines) {
            line = line.trim();
            if (!line) continue;
            const urls = line.match(/https?:\/\/[^\s]+/g);
            if (urls) {
                for (let url of urls) {
                    if (url.includes('vk.com') && extractUserId(url)) links.push(url);
                }
            } else if (line.includes('vk.com') && extractUserId(line)) links.push(line);
        }
        return links;
    }

    function jsonpRequest(url, timeout=15000) {
        return new Promise((resolve, reject) => {
            const script = document.createElement('script');
            const cb = `jsonp_${Date.now()}_${Math.random().toString(36).substr(2,8)}`;
            window[cb] = (data) => { delete window[cb]; document.head.removeChild(script); clearTimeout(timer); resolve(data); };
            const timer = setTimeout(() => { delete window[cb]; document.head.removeChild(script); reject(new Error('Timeout')); }, timeout);
            script.src = `${url}${url.includes('?')?'&':'?'}callback=${cb}`;
            script.onerror = () => { delete window[cb]; document.head.removeChild(script); clearTimeout(timer); reject(new Error('Load error')); };
            document.head.appendChild(script);
        });
    }

    async function fetchUsersByLinks(links, token) {
        const ids = [];
        for (const link of links) {
            const uid = extractUserId(link);
            if (uid) ids.push(uid);
        }
        if (!ids.length) throw new Error('Нет ID');
        const uniqueIds = [...new Set(ids)];
        const url = `https://api.vk.com/method/users.get?user_ids=${uniqueIds.join(',')}&fields=photo_200&access_token=${token}&v=5.131`;
        const data = await jsonpRequest(url);
        if (data.error) throw new Error(`VK API: ${data.error.error_msg}`);
        return data.response || [];
    }

    function escapeHtml(s) { if(!s) return ''; return s.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'})[m]); }
    function shorten(s, max) { return s.length <= max ? s : s.slice(0,max-3)+'...'; }

    async function renderAvatars(usersArray, linksOrder) {
        const grid = document.getElementById('avatarsGrid');
        if (!usersArray.length && !linksOrder.length) { grid.innerHTML = '<p>⚠️ Нет ссылок</p>'; return; }
        const userById = new Map(usersArray.map(u => [u.id, u]));
        let html = '';
        const newUsers = [];
        for (const link of linksOrder) {
            const uid = extractUserId(link);
            const user = uid ? userById.get(Number(uid)) : null;
            const cardId = `card_${nextCardId++}`;
            if (user) {
                let criteriaHtml = '';
                for (const c of CRITERIA) {
                    criteriaHtml += `
                        <div class="criterion">
                            <div class="criterion-header"><span>${c.emoji} ${c.name}</span><span class="criterion-value-${c.id}">0</span></div>
                            <div class="stars-small stars-${c.id}">${[1,2,3,4,5].map(i => `<span class="star-small" onclick="setCriterionRating('${cardId}', '${c.id}', ${i})">★</span>`).join('')}</div>
                        </div>`;
                }
                html += `
                    <article id="${cardId}" class="avatar-card">
                        <div class="delete-btn" onclick="deleteAccount('${cardId}')">✕</div>
                        <img src="${user.photo_200 || user.photo_100}" alt="Avatar" loading="lazy" onerror="this.src='https://vk.com/images/camera_200.png'">
                        <div class="user-name">${escapeHtml(user.first_name)} ${escapeHtml(user.last_name)}</div>
                        <a href="${link}" target="_blank" class="user-link" rel="noopener noreferrer">${shorten(link,45)}</a>
                        <div class="criteria-container">${criteriaHtml}<div class="total-rating">⭐ Итог: <span>0</span>/5</div></div>
                        <div class="face-checkbox"><input type="checkbox" id="chk_${cardId}" onchange="toggleFace('${cardId}', this.checked)"><label>😊 Настоящее лицо</label></div>
                    </article>`;
                newUsers.push({ elementId: cardId, link, scores: {figure:0,looks:0,interests:0,myRating:0}, totalRating:0, isFace:false, isDeleted:false, user });
            } else {
                html += `<article id="${cardId}" class="avatar-card"><div class="delete-btn" onclick="deleteAccount('${cardId}')">✕</div><img src="https://vk.com/images/camera_200.png" alt="Not found"><div class="user-name">❌ Не найден</div><a href="${link}" target="_blank" class="user-link" rel="noopener noreferrer">${shorten(link,45)}</a><div class="criteria-container" style="opacity:0.5"><div class="criterion"><div class="criterion-header">💃 Фигура</div><div class="stars-small">★★★★★</div></div><div class="criterion"><div class="criterion-header">👸 Внешность</div><div class="stars-small">★★★★★</div></div><div class="criterion"><div class="criterion-header">📚 Интересы</div><div class="stars-small">★★★★★</div></div><div class="criterion"><div class="criterion-header">🧠 Моя оценка</div><div class="stars-small">★★★★★</div></div><div class="total-rating">Профиль недоступен</div></div><div class="face-checkbox" style="opacity:0.5"><input type="checkbox" disabled><label>Недоступно</label></div></article>`;
                newUsers.push({ elementId: cardId, link, scores: {figure:0,looks:0,interests:0,myRating:0}, totalRating:0, isFace:false, isDeleted:false, user:null });
            }
        }
        grid.innerHTML = html;
        currentUsers = newUsers;
        document.getElementById('controlBar').style.display = 'flex';
        document.getElementById('filterBar').style.display = 'flex';
        updateStats();
        
        await syncFromCloud();
        startAutoSync();
        
        const statusDiv = document.getElementById('status');
        statusDiv.innerHTML = `✅ Загружено ${usersArray.length} из ${linksOrder.length}. ☁️ Синхронизация активна!`;
    }

    async function loadAvatars() {
        const rawToken = document.getElementById('tokenInput').value.trim();
        const token = extractTokenFromString(rawToken);
        const linksText = document.getElementById('linksInput').value;
        if (!token) { document.getElementById('status').innerHTML = '⚠️ Введите токен'; return; }
        const links = parseLinksFromText(linksText);
        if (!links.length) { document.getElementById('status').innerHTML = '❌ Нет ссылок'; return; }
        document.getElementById('status').innerHTML = '⏳ Загрузка...';
        document.getElementById('loadBtn').disabled = true;
        try {
            const users = await fetchUsersByLinks(links, token);
            await renderAvatars(users, links);
        } catch(e) { 
            document.getElementById('status').innerHTML = `❌ Ошибка: ${e.message}`;
            safeWarn(e);
        } finally { 
            document.getElementById('loadBtn').disabled = false; 
        }
    }

    async function smartPaste() {
        try {
            const text = await navigator.clipboard.readText();
            const extracted = extractTokenFromString(text);
            document.getElementById('tokenInput').value = extracted || text;
            const btn = document.getElementById('smartPasteBtn');
            const orig = btn.innerText;
            btn.innerText = '✅ Готово!';
            setTimeout(() => btn.innerText = orig, 1500);
        } catch(e) { 
            alert('Не удалось вставить. Попробуйте вручную.');
        }
    }

    function clearAll() {
        if(autoSyncTimer) clearInterval(autoSyncTimer);
        document.getElementById('linksInput').value = '';
        document.getElementById('tokenInput').value = '';
        document.getElementById('avatarsGrid').innerHTML = '';
        document.getElementById('controlBar').style.display = 'none';
        document.getElementById('filterBar').style.display = 'none';
        document.getElementById('status').innerHTML = '⏳ Очищено';
        currentUsers = [];
        nextCardId = 0;
    }

    // === Назначение обработчиков ===
    document.getElementById('loadBtn').onclick = loadAvatars;
    document.getElementById('clearBtn').onclick = clearAll;
    document.getElementById('smartPasteBtn').onclick = smartPaste;
    document.getElementById('syncNowBtn').onclick = () => saveToCloud();
    document.getElementById('sortByRatingDesc').onclick = () => { currentSortMode = 'ratingDesc'; sortAndRender(); };
    document.getElementById('sortByRatingAsc').onclick = () => { currentSortMode = 'ratingAsc'; sortAndRender(); };
    document.getElementById('sortByOriginal').onclick = () => { currentSortMode = 'original'; sortAndRender(); };
    document.getElementById('showAllBtn').onclick = () => applyFilter('all');
    document.getElementById('showHighRatedBtn').onclick = () => applyFilter('highRated');
    document.getElementById('showUnratedBtn').onclick = () => applyFilter('unrated');
    document.getElementById('showFacesOnlyBtn').onclick = () => applyFilter('faces');
    document.getElementById('resetFacesBtn').onclick = resetAllFaces;
    
    window.restoreAll = restoreAll;
    
    safeLog('HTML5 приложение загружено');
</script>

</body></html>
